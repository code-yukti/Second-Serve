<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | FeedLink</title>
    <link rel="stylesheet" href="style/all.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
</head>
<body>

<!-- Navigation -->
<header class="navbar">
    <div class="navbar-container">
        <div class="logo">
            <a href="#" class="logo">

     <svg
      viewBox="0 0 600 200"
      xmlns="http://www.w3.org/2000/svg"
    >

      <!-- FEED -->
      <text
        x="40"
        y="130"
        font-size="100"
        font-family="Arial, sans-serif"
        font-weight="700"
        fill="#ffa000"
      >
        Feed
      </text>

      <!-- LINK -->
      <text
        x="280"
        y="130"
        font-size="100"
        font-family="Arial, sans-serif"
        font-weight="700"
        fill="white"
      >
       Link
      </text>

      <!-- CURVE (d → n) -->
      <path
    id="foodPath"
    d="M 220 140
       C 280 190, 360 190, 420 150
       S 500 120, 540 140"
    fill="none"
    stroke="#ffa000"
    stroke-width="6"
    stroke-dasharray="10 14"
    stroke-linecap="round"
  />

      <polygon
    points="0,-7 16,0 0,7"
    fill="white">
    <animateMotion
      dur="2.5s"
      repeatCount="indefinite"
      rotate="auto">
      <mpath href="#foodPath"/>
    </animateMotion>
  </polygon> 
  </svg>

  </a>
        </div>
        <nav class="nav-menu">
            <a href="index.html" class="nav-link">Home</a>
            <a href="login.html" class="nav-link login-btn">Login</a>
            <button class="dark-mode-toggle" id="darkModeToggle" title="Toggle Dark Mode">
                <i class="fas fa-moon"></i>
            </button>
        </nav>
    </div>
</header>

<section class="auth-box">
    <div class="signup-header">
        <h2><i class="fas fa-user-plus"></i> Create Your Account</h2>
        <p>Join FeedLink and make a difference in your community</p>
    </div>

    <form id="signupForm">
        <div class="form-group">
            <label for="userType">I am a:</label>
            <select id="userType" required>
                <option value="">-- Select Role --</option>
                <option value="donor">Food Donor</option>
                <option value="ngo">NGO / Organization</option>
            </select>
            <p class="info-text">Choose your role to continue</p>
        </div>

        <div class="form-group donor-type-field" id="donorTypeField">
            <label for="donorType">Donor Type:</label>
            <select id="donorType" required>
                <option value="">-- Select Donor Type --</option>
                <option value="restaurant">🍽️ Restaurant / Cafe</option>
                <option value="household">🏠 Household</option>
                <option value="event">🎉 Event / Party</option>
                <option value="hotel">🏨 Hotel / Catering</option>
                <option value="bakery">🥐 Bakery</option>
                <option value="grocery">🛒 Grocery Store</option>
                <option value="supermarket">🏬 Supermarket</option>
                <option value="other">📦 Other</option>
            </select>
            <p class="info-text">Tell us where your food donation comes from</p>
        </div>

        <div class="form-group">
            <input type="text" id="fullName" placeholder="Full Name / Organization Name" required>
        </div>

        <div class="form-group">
            <input type="email" id="email" placeholder="Email Address" required>
        </div>

        <div class="form-group">
            <div class="password-input-wrapper">
                <input type="password" id="password" placeholder="Password (Minimum 8 characters)" required minlength="8" required maxlength="12" >
                <button type="button" class="password-toggle-btn" id="passwordToggle" title="Show/Hide Password">
                    <i class="fas fa-eye"></i>
                </button>
            </div>
        </div>

        <div class="form-group">
            <div class="password-input-wrapper">
                <input type="password" id="confirmPassword" placeholder="Confirm Password" required minlength="8" required maxlength="12">
                <button type="button" class="password-toggle-btn" id="confirmPasswordToggle" title="Show/Hide Password">
                    <i class="fas fa-eye"></i>
                </button>
            </div>
        </div>
         <div class="form-group location-group">
            <input type="text" id="city" class="location-input" placeholder="City / Location" required aria-label="City or location" />
            <button type="button" id="useLocationBtn" class="location-btn" title="Use my current location" aria-label="Use my current location">
                <i class="fas fa-map-pin" aria-hidden="true"></i>
            </button>
            <input type="hidden" id="latitude" name="latitude" />
            <input type="hidden" id="longitude" name="longitude" />
            <small id="locationStatus" class="info-text"></small>
        </div>


        <div class="form-group">
            <input type="tel" id="phone" placeholder="Phone Number" pattern="[0-9]+" required>
        </div>

        <button type="submit" class="signup-submit"><i class="fas fa-check-circle"></i> Sign Up</button>
        <p>Already registered? <a href="login.html">Login here</a></p>
    </form>
</section>

<!-- Footer -->
<footer class="footer">
    <div class="section-container">
        <div class="footer-bottom">
            <p>&copy; 2026 FeedLink | All Rights Reserved | Recovering Food, Feeding Hope</p>
        </div>
    </div>
</footer>

<script src="script/api-config.js"></script>
<script src="script/api-utils.js"></script>
<script src="script/api.js"></script>
<script src="script/signup.js"></script>
<script src="script/all.js"></script>

</body>
</html>
