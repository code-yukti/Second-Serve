<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FeedLink NGO Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:linear-gradient(135deg,#3f8f44,#79b977);
  color:#fff;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}
h3{
  color: #000;
}
/* Top */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.title{
  font-size:22px;
  font-weight:600;
}

.btn{
  background:#f4c430;
  color:#333;
  border:none;
  padding:8px 14px;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
}

/* Stats */
.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:16px;
  margin-bottom:25px;
}

.stat-card{
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(10px);
  padding:18px;
  border-radius:16px;
}

.stat-card h2{margin:0;font-size:28px}
.stat-card p{margin:5px 0 0;font-size:13px;opacity:.9}

/* Layout */
.grid{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:20px;
}

.card{
  background:white;
  color:#333;
  border-radius:18px;
  padding:18px;
}

.card h3{margin-top:0}

/* Requests */
.request{
  border-bottom:1px solid #eee;
  padding:10px 0;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.request:last-child{border-bottom:none}

.request small{color:#777}

.actions button{
  margin-left:6px;
  border:none;
  padding:5px 8px;
  border-radius:6px;
  cursor:pointer;
}

.accept{background:#4CAF50;color:white}
.reject{background:#f44336;color:white}

/* Sidebar */
.profile{
  text-align:center;
}

.avatar{
  width:70px;
  height:70px;
  border-radius:50%;
  background:#ddd;
  margin:auto;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
}

.badge{
  margin-top:8px;
  display:inline-block;
  background:#4CAF50;
  color:white;
  padding:4px 10px;
  border-radius:999px;
  font-size:11px;
}

.menu{
  margin-top:18px;
}

.menu button{
  width:100%;
  margin:6px 0;
  border:none;
  background:#f5f5f5;
  padding:8px;
  border-radius:8px;
  cursor:pointer;
}

/* Mobile */
@media(max-width:800px){
  .grid{grid-template-columns:1fr}
}
.profile-modal{
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.profile-card{
  background: white;
  width: 400px;
  border-radius: 16px;
  padding: 25px;
  position: relative;
  animation: pop 0.25s ease;
}

@keyframes pop{
  from{transform: scale(.9);opacity:0}
  to{transform: scale(1);opacity:1}
}

.back-btn{
  position:absolute;
  left:15px;
  top:15px;
  background:none;
  border:none;
  font-size:14px;
  cursor:pointer;
  color:#4CAF50;
  font-weight:600;
}

.profile-header{
  text-align:center;
}

.profile-header img{
  width:90px;
  height:90px;
  border-radius:50%;
  object-fit:cover;
}

/* popup profile name small and black */
#ngoProfileTitle{
  color:#000;
  font-size:14px;
  margin:8px 0 6px;
  text-align:center;
  font-weight:600;
}

.upload-btn{
  margin-top:6px;
  font-size:12px;
  background:#eee;
  border:none;
  padding:5px 10px;
  border-radius:8px;
  cursor:pointer;
}

.verified-badge{
  display:inline-block;
  background:#4CAF50;
  color:white;
  padding:4px 10px;
  border-radius:20px;
  font-size:12px;
  margin-top:5px;
}

.profile-field{
  margin-top:15px;
}

.profile-field label{
  font-size:13px;
  color:#555;
}
.ngo-name-input{
  border:none;
  font-size:20px;
  font-weight:700;
  text-align:center;
  margin-top:10px;
  outline:none;
  background:transparent;
}

.profile-field input,
.profile-field textarea{
  width:100%;
  margin-top:4px;
  padding:8px;
  border-radius:8px;
  border:1px solid #ccc;
}

textarea{resize:none;height:70px}

.save-btn{
  margin-top:20px;
  width:100%;
  background:#4CAF50;
  color:white;
  border:none;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
}

</style>
</head>
<body>

<div class="container">

  <div class="topbar">
    <div class="title">NGO Dashboard</div>
   <a href="mailto:team.yukti.official@gmail.com"><button class="btn">+ Add Report</button></a>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card">
      <h2 id="requestCount">24</h2>
      <p>Food Requests</p>
    </div>
    <div class="stat-card">
      <h2 id="acceptedCount">12</h2>
      <p>Accepted Donations</p>
    </div>
    <div class="stat-card">
      <h2 id="mealsDistributed">320+</h2>
      <p>Meals Distributed</p>
    </div>
  </div>

  <div class="grid">

    <!-- Requests -->
    <div class="card">
      <h3>Recent Donation Requests</h3>

      <div id="requestList">
        <div class="request">
          <div>
            <b>Restaurant Surya</b><br>
            <small>10 meal packs • 2km away</small>
          </div>
          <div class="actions">
            <button class="accept">Accept</button>
            <button class="reject">Reject</button>
          </div>
        </div>

        <div class="request">
          <div>
            <b>Wedding Hall</b><br>
            <small>50 meal packs • 5km away</small>
          </div>
          <div class="actions">
            <button class="accept">Accept</button>
            <button class="reject">Reject</button>
          </div>
        </div>

        <div class="request">
          <div>
            <b>College Event</b><br>
            <small>30 meal packs • 1.2km away</small>
          </div>
          <div class="actions">
            <button class="accept">Accept</button>
            <button class="reject">Reject</button>
          </div>
        </div>
      </div>

    </div>

    <!-- Sidebar -->
    <div class="card">
      <div class="profile">
        <div class="avatar" onclick="openNgoProfile()"></div>
        <div class="badge">Verified NGO</div>
        <h4 id="ngoName">Helping Hands NGO</h4>
      </div>

      <div class="menu">
        <button class="card-btn profile-btn"><i class="fas fa-user"></i>Profile</button>
       <a href="mailto:team.yukti.official@gmail.com"><button onclick="location.href='reports.html'"><i class="fas fa-chart-bar"></i>Reports</button></a>
        <button onclick="location.href='settings.html'"><i class="fas fa-cog"></i>Settings</button>
        <button onclick="logout()"><i class="fas fa-sign-out-alt"></i>Logout</button>
      </div>
    </div>

  </div>

</div>
<!-- NGO Profile Modal -->
 
<div id="ngoProfileModal" class="profile-modal">
  <div class="profile-card">

   <button class="back-btn" onclick="closeNgoProfile()">← Back</button>

    <div class="profile-header">
      <img id="ngoAvatar" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" />
      <input type="file" id="uploadAvatar" hidden>
      <button class="upload-btn" onclick="document.getElementById('uploadAvatar').click()">Change Photo</button>

      <h3 id="ngoProfileTitle">Helping Hands</h3>
      <span class="verified-badge">✔ Verified NGO</span>
    </div>

    <div class="profile-body">

      <div class="profile-field">
        <label>Email</label>
        <input id="ngoEmail" type="text" disabled>
      </div>

      <div class="profile-field">
        <label>Phone</label>
        <input id="ngoPhone" type="text">
      </div>

      <div class="profile-field">
        <label>Address</label>
        <input id="ngoAddress" type="text">
      </div>

      <div class="profile-field">
        <label>Description</label>
        <textarea id="ngoDesc"></textarea>
      </div>

      <button type="button" class="save-btn" onclick="saveNgoProfile(event)">💾 Save Changes</button>

    </div>
  </div>
</div>


<script>
const API_BASE = '/api';
const token = localStorage.getItem('authToken');

async function fetchJSON(path, opts = {}){
  const headers = opts.headers || {};
  headers['Content-Type'] = 'application/json';
  if(token) headers['Authorization'] = `Bearer ${token}`;
  const res = await fetch(API_BASE + path, {...opts, headers});
  if(!res.ok) throw new Error(await res.text());
  return res.status !== 204 ? res.json() : null;
}

function renderRequests(list){
  const container = document.getElementById('requestList');
  container.innerHTML = '';
  if(!list || !list.length){
    container.innerHTML = '<p>No requests found.</p>';
    return;
  }
  list.forEach(r => {
    const row = document.createElement('div');
    row.className = 'request';
    if(r.id !== undefined) row.dataset.id = r.id;
    const left = document.createElement('div');
    left.innerHTML = `<b>${r.sourceName || r.title || 'Unknown'}</b><br><small>${r.items || ''} • ${r.distance || ''}</small>`;
    row.appendChild(left);
    const actions = document.createElement('div');
    actions.className = 'actions';

    const acc = document.createElement('button');
    acc.className = 'accept';
    acc.innerText = 'Accept';
    acc.onclick = () => acceptRequest(r.id, row, acc, rej);

    const rej = document.createElement('button');
    rej.className = 'reject';
    rej.innerText = 'Reject';
    rej.onclick = () => rejectRequest(r.id, row, acc, rej);

    actions.appendChild(acc);
    actions.appendChild(rej);
    row.appendChild(actions);
    container.appendChild(row);
  });
}

async function acceptRequest(id){
  // kept for backwards compatibility when called without args
  return acceptRequest(id, null, null, null);
}

async function rejectRequest(id){
  // kept for backwards compatibility when called without args
  return rejectRequest(id, null, null, null);
}

async function acceptRequest(id, row, accBtn, rejBtn){
  if(!id) return;
  const rowEl = row || document.querySelector(`[data-id="${id}"]`);
  const acc = accBtn || (rowEl && rowEl.querySelector('.accept'));
  const rej = rejBtn || (rowEl && rowEl.querySelector('.reject'));
  if(acc) acc.disabled = true;
  if(rej) rej.disabled = true;

  // optimistic UI: remove request and update counts
  const prevRequests = Array.from(document.querySelectorAll('#requestList .request'));
  const prevRequestCount = parseInt(document.getElementById('requestCount').innerText) || prevRequests.length;
  const prevAccepted = parseInt(document.getElementById('acceptedCount').innerText) || 0;

  if(rowEl) rowEl.remove();
  document.getElementById('requestCount').innerText = Math.max(0, prevRequestCount - 1);
  document.getElementById('acceptedCount').innerText = prevAccepted + 1;

  try{
    await fetchJSON(`/requests/${id}/accept`, {method: 'POST'});
  }catch(e){
    console.warn('Accept failed, reloading list', e);
    // revert by reloading server data
    loadNGODashboard();
  }
}

async function rejectRequest(id, row, accBtn, rejBtn){
  if(!id) return;
  const rowEl = row || document.querySelector(`[data-id="${id}"]`);
  const acc = accBtn || (rowEl && rowEl.querySelector('.accept'));
  const rej = rejBtn || (rowEl && rowEl.querySelector('.reject'));
  if(acc) acc.disabled = true;
  if(rej) rej.disabled = true;

  const prevRequests = Array.from(document.querySelectorAll('#requestList .request'));
  const prevRequestCount = parseInt(document.getElementById('requestCount').innerText) || prevRequests.length;

  if(rowEl) rowEl.remove();
  document.getElementById('requestCount').innerText = Math.max(0, prevRequestCount - 1);

  try{
    await fetchJSON(`/requests/${id}/reject`, {method: 'POST'});
  }catch(e){
    console.warn('Reject failed, reloading list', e);
    loadNGODashboard();
  }
}

async function loadNGODashboard(){
  try{
    const ngo = await fetchJSON('/ngo').catch(()=>null);
    if(ngo && ngo.name) document.getElementById('ngoName').innerText = ngo.name;

    const stats = await fetchJSON('/ngo/stats').catch(()=>null);
    if(stats){
      if(stats.requests !== undefined) document.getElementById('requestCount').innerText = stats.requests;
      if(stats.accepted !== undefined) document.getElementById('acceptedCount').innerText = stats.accepted;
      if(stats.volunteers !== undefined) document.getElementById('volunteersCount').innerText = stats.volunteers;
      if(stats.meals !== undefined) document.getElementById('mealsDistributed').innerText = stats.meals;
    }

    const requests = await fetchJSON('/ngo/requests').catch(()=>[]);
    renderRequests(requests || []);
  }catch(e){
    console.warn('NGO dashboard load failed', e);
  }
}

// Polling for real-time updates
let POLL_INTERVAL = 10000; // 10s
let _ngoLoading = false;
let _ngoPollTimer = null;

async function loadNGODashboardPoll(){
  if(_ngoLoading) return;
  _ngoLoading = true;
  try{
    await loadNGODashboard();
  }finally{
    _ngoLoading = false;
  }
}

function startNGOPolling(){
  if(_ngoPollTimer) return;
  _ngoPollTimer = setInterval(()=>{ loadNGODashboardPoll().catch(()=>{}); }, POLL_INTERVAL);
}

function stopNGOPolling(){
  if(_ngoPollTimer){ clearInterval(_ngoPollTimer); _ngoPollTimer = null; }
}

document.addEventListener('visibilitychange', ()=>{
  if(document.visibilityState === 'visible'){
    loadNGODashboardPoll().catch(()=>{});
    startNGOPolling();
  }else{
    stopNGOPolling();
  }
});

// initial load and start polling
loadNGODashboardPoll().then(()=> startNGOPolling());
// Open popup when profile clicked
document.querySelectorAll(".profile-btn").forEach(btn=>{
  btn.onclick = openNgoProfile;
});

function openNgoProfile(){
  document.getElementById("ngoProfileModal").style.display = "flex";
  loadNgoProfile();
}

function closeNgoProfile(){
  document.getElementById("ngoProfileModal").style.display = "none";
}
function loadNgoProfile(){
  const data = JSON.parse(localStorage.getItem("ngoProfile")) || {};

  const sidebarName = document.getElementById('ngoName');
  if(sidebarName) sidebarName.textContent = data.name || sidebarName.textContent || 'Helping Hands NGO';

  const profileTitle = document.getElementById('ngoProfileTitle');
  if(profileTitle) profileTitle.textContent = data.name || sidebarName?.textContent || 'Helping Hands';

  const emailEl = document.getElementById('ngoEmail');
  const phoneEl = document.getElementById('ngoPhone');
  const addrEl = document.getElementById('ngoAddress');
  const descEl = document.getElementById('ngoDesc');

  if(emailEl) emailEl.value = data.email || '';
  if(phoneEl) phoneEl.value = data.phone || '';
  if(addrEl) addrEl.value = data.address || '';
  if(descEl) descEl.value = data.desc || '';

  if(data.avatar && ngoAvatar) ngoAvatar.src = data.avatar;
}

function saveNgoProfile(e){
  if(e){ e.preventDefault(); e.stopPropagation(); }
  const sidebarName = document.getElementById('ngoName');
  const profileTitle = document.getElementById('ngoProfileTitle');
  const emailEl = document.getElementById('ngoEmail');
  const phoneEl = document.getElementById('ngoPhone');
  const addrEl = document.getElementById('ngoAddress');
  const descEl = document.getElementById('ngoDesc');

  const data = {
    name: (sidebarName && sidebarName.textContent) || (profileTitle && profileTitle.textContent) || '',
    email: emailEl ? emailEl.value : '',
    phone: phoneEl ? phoneEl.value : '',
    address: addrEl ? addrEl.value : '',
    desc: descEl ? descEl.value : '',
    avatar: ngoAvatar ? ngoAvatar.src : ''
  };

  localStorage.setItem("ngoProfile", JSON.stringify(data));
  if(sidebarName) sidebarName.textContent = data.name || sidebarName.textContent;
  if(profileTitle) profileTitle.textContent = data.name || profileTitle.textContent;

  alert("Profile updated ✅");
  closeNgoProfile();
}
uploadAvatar.onchange = e=>{
  const file = e.target.files[0];
  const reader = new FileReader();
  reader.onload = () => ngoAvatar.src = reader.result;
  reader.readAsDataURL(file);
};
const uploadInput = document.getElementById("uploadAvatar");
const ngoAvatar = document.getElementById("ngoAvatar");

uploadInput.addEventListener("change", function () {
  const file = this.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = function (e) {
    const imgData = e.target.result;

    // Show in popup
    ngoAvatar.src = imgData;

    // Save in localStorage
    const profile = JSON.parse(localStorage.getItem("ngoProfile")) || {};
    profile.avatar = imgData;
    localStorage.setItem("ngoProfile", JSON.stringify(profile));
  };

  reader.readAsDataURL(file);
});
document.addEventListener("DOMContentLoaded", () => {
  const avatarDiv = document.querySelector(".avatar");
  const data = JSON.parse(localStorage.getItem("ngoProfile"));

  if (data && data.avatar) {
    avatarDiv.style.backgroundImage = `url(${data.avatar})`;
    avatarDiv.style.backgroundSize = "cover";
    avatarDiv.style.backgroundPosition = "center";
  }
});

// Logout handler
function logout(){
  localStorage.removeItem('authToken');
  localStorage.removeItem('ngoProfile');
  localStorage.removeItem('userName');
  localStorage.removeItem('userEmail');
  location.href = 'login.html';
}


</script>

</body>
</html>
