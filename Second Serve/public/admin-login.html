<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Second Serve</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 450px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo i {
            font-size: 60px;
            color: #667eea;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 40px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .warning {
            background: #fff3cd;
            border: 1px solid #ffc107;
            padding: 15px;
            border-radius: 10px;
            margin-top: 25px;
            font-size: 13px;
            color: #856404;
        }

        .credentials {
            background: #e3f2fd;
            border: 1px solid #2196f3;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            font-size: 13px;
            color: #0d47a1;
        }

        .credentials strong {
            display: block;
            margin-bottom: 8px;
            color: #667eea;
        }

        .error-message {
            color: #dc3545;
            text-align: center;
            margin-bottom: 15px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <i class="fas fa-lock"></i>
        </div>
        <h1>Admin Dashboard</h1>
        <div class="subtitle">Second Serve Database Management System</div>

        <div id="errorMessage" class="error-message"></div>

        <form id="adminLoginForm">
            <div class="form-group">
                <label><i class="fas fa-user"></i> Admin Username</label>
                <input type="text" id="username" placeholder="Enter admin username" required>
            </div>

            <div class="form-group">
                <label><i class="fas fa-key"></i> Secret Key</label>
                <input type="password" id="secretKey" placeholder="Enter secret key" required>
            </div>

            <button type="submit" class="btn-login">
                <i class="fas fa-sign-in-alt"></i> Access Dashboard
            </button>
        </form>

        <div class="warning">
            <strong>⚠️ Restricted Access:</strong> This dashboard is for authorized database administrators only. Unauthorized access is prohibited.
        </div>
    </div>

    <script>
        // API base URL - automatically detects environment
        const API_BASE_URL = window.location.hostname === 'localhost' 
            ? 'http://localhost:5000/api'
            : window.location.origin + '/api';

        document.getElementById('adminLoginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const secretKey = document.getElementById('secretKey').value;
            const errorDiv = document.getElementById('errorMessage');
            const submitBtn = e.target.querySelector('button[type="submit"]');

            // Disable button and show loading
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Authenticating...';
            errorDiv.style.display = 'none';

            try {
                // Call backend API for secure authentication
                const response = await fetch(`${API_BASE_URL}/admin/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, secretKey })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    // Store admin session
                    localStorage.setItem('adminAuthenticated', 'true');
                    localStorage.setItem('adminLoginTime', new Date().toISOString());
                    localStorage.setItem('adminUsername', username);

                    // Redirect to dashboard
                    window.location.href = 'admin-dashboard.html';
                } else {
                    errorDiv.textContent = '❌ ' + (data.message || 'Invalid credentials. Please try again.');
                    errorDiv.style.display = 'block';
                    document.getElementById('secretKey').value = '';
                }
            } catch (error) {
                console.error('Login error:', error);
                errorDiv.textContent = '❌ Connection error. Please make sure the server is running.';
                errorDiv.style.display = 'block';
            } finally {
                // Re-enable button
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Access Dashboard';
            }
        });

        // Check if already logged in
        if (localStorage.getItem('adminAuthenticated')) {
            window.location.href = 'admin-dashboard.html';
        }
    </script>
</body>
</html>
